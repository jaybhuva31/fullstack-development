<!DOCTYPE html>
<html>
<head>
    <title>HTML Table</title>
</head>
<body>

    <h1>Student Table</h1>

    <table border="1" cellpadding="10">
        <caption>Student Data</caption>

        <thead>
            <tr>
                <th>Name</th>
                <th>Marks</th>
                <th>Result</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Jay</td>
                <td>90</td>
                <td>Pass</td>
            </tr>

            <tr>
                <td>Raj</td>
                <td>70</td>
                <td>Pass</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="3">End of Data</td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
