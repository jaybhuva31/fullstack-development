<!DOCTYPE html>
<html>
<head>
    <title>Block vs Inline</title>
</head>

<body>

    <h2>Block Element Example</h2>

    <div style="background:lightblue;">
        This is DIV 1
    </div>

    <div style="background:lightgreen;">
        This is DIV 2
    </div>

    <hr>

    <h2>Inline Element Example</h2>

    <span style="background:yellow;">
        Span 1
    </span>

    <span style="background:orange;">
        Span 2
    </span>

</body>
</html>
