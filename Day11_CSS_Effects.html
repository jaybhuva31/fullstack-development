<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 11 - CSS Effects</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🚀 Day 11 - CSS Effects Showcase</h1>

    <!-- Images -->
    <section>

        <h2>Rounded Image</h2>

        <img src="https://picsum.photos/200"
             class="rounded"
             alt="Rounded">

        <h2>Thumbnail Image</h2>

        <img src="https://picsum.photos/200"
             class="thumbnail"
             alt="Thumbnail">

        <h2>Responsive Image</h2>

        <img src="https://picsum.photos/600/300"
             class="responsive"
             alt="Responsive">

        <h2>Transparent Image</h2>

        <img src="https://picsum.photos/200"
             class="transparent"
             alt="Transparent">

        <h2>Flip Image</h2>

        <img src="https://picsum.photos/200"
             class="flip"
             alt="Flip">

    </section>

    <hr>

    <!-- Gradients -->
    <section>

        <h2>Gradients</h2>

        <div class="gradient linear">
            Linear Gradient
        </div>

        <div class="gradient radial">
            Radial Gradient
        </div>

        <div class="gradient conic">
            Conic Gradient
        </div>

    </section>

    <hr>

    <!-- Transition -->
    <section>

        <h2>Transition Example</h2>

        <button class="transition-btn">
            Hover Me
        </button>

    </section>

    <hr>

    <!-- Animation -->
    <section>

        <h2>Animation Example</h2>

        <div class="box"></div>

    </section>

    <hr>

    <!-- Tooltip -->
    <section>

        <h2>Tooltip Example</h2>

        <div class="tooltip">

            Hover over me

            <span class="tooltip-text">
                🚀 Full Stack Developer
            </span>

        </div>

    </section>

</body>
</html>
