<!DOCTYPE html>
<html>
<head>
    <title>Image Map</title>
</head>

<body style="font-family: Arial; text-align:center;">

    <h1>🗺 Image Map Example</h1>

    <img src="https://via.placeholder.com/400x200"
         usemap="#demo-map"
         alt="Demo">

    <map name="demo-map">

        <area shape="rect"
              coords="0,0,200,200"
              href="https://google.com"
              alt="Google">

        <area shape="rect"
              coords="200,0,400,200"
              href="https://github.com"
              alt="GitHub">

    </map>

    <p>
        Left side → Google <br>
        Right side → GitHub
    </p>

</body>
</html>
