<!DOCTYPE html>
<html>
<head>
    <title>HTML Lists</title>
</head>
<body>

    <h1>Lists Example</h1>

    <h2>Unordered List</h2>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>

    <h2>Ordered List</h2>
    <ol type="A">
        <li>Learn</li>
        <li>Practice</li>
        <li>Build</li>
    </ol>

    <h2>Description List</h2>
    <dl>
        <dt>HTML</dt>
        <dd>Structure of webpage</dd>

        <dt>CSS</dt>
        <dd>Styling of webpage</dd>
    </dl>

</body>
</html>
